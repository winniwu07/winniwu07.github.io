<!DOCTYPE html>
<html>
<head>
    <title>Fancify Shamcify</title>
</head>
<body>

<h1>Fancify My Text</h1>

<!-- Text fieldset -->
<fieldset>
    <legend>Text</legend>
    <textarea id="textBox" rows="4" cols="30"></textarea>
</fieldset>

<!-- Fancify fieldset -->
<fieldset>
    <legend>Fancify</legend>
    <button id="biggerBtn">Bigger!</button>
    <br><br>
    <input type="radio" id="fancyRadio" name="styleRadio">
    <label for="fancyRadio">FancyShmancy</label>
    <br>
    <input type="radio" id="boringRadio" name="styleRadio" checked>
    <label for="boringRadio">BoringBetty</label>
</fieldset>

<br>
<button id="mooBtn">Moo</button>

<!-- Link to external JavaScript file -->
<script src="fancifymytext.js"></script>

</body>
</html>
